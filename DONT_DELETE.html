<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A GİT FOLDER</title>
</head>
<body style="
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(1200px 600px at 20% 10%, rgba(255,255,255,.10), transparent 55%),
              radial-gradient(900px 500px at 80% 90%, rgba(255,255,255,.08), transparent 60%),
              #0b1220;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
  color:#eaf0ff;
">

  <main style="
    width:min(920px, 92vw);
    padding:42px 28px;
    border-radius:22px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    box-shadow: 0 18px 60px rgba(0,0,0,.45);
    backdrop-filter: blur(10px);
  ">
    <div style="
      display:flex;
      flex-wrap:wrap;
      gap:18px;
      align-items:center;
      justify-content:space-between;
    ">
      <div>
        <div style="
          display:inline-flex;
          align-items:center;
          gap:10px;
          padding:8px 12px;
          border-radius:999px;
          background: rgba(255,255,255,.08);
          border:1px solid rgba(255,255,255,.12);
          font-size:13px;
          letter-spacing:.25px;
          color: rgba(234,240,255,.88);
        ">
          <span style="
            width:10px;height:10px;border-radius:50%;
            background:#32d583; box-shadow: 0 0 0 6px rgba(50,213,131,.15);
            display:inline-block;
          "></span>
          Inline CSS • Tek Dosya HTML
        </div>

        <h1 style="
          margin:14px 0 6px;
          font-size: clamp(34px, 5vw, 54px);
          line-height: 1.05;
          letter-spacing: .5px;
          font-weight: 800;
        ">
          A GİT FOLDER
        </h1>

        <p style="
          margin:0;
          max-width: 62ch;
          font-size: 16px;
          line-height: 1.6;
          color: rgba(234,240,255,.78);
        ">
          Bu sayfa tamamen <strong style="color:#fff;">inline CSS</strong> ile hazırlanmıştır.
          İstersen alttaki butonu tıklayınca bir örnek aksiyon da gösterecek.
        </p>
      </div>

      <button type="button" onclick="document.getElementById('msg').textContent='✅ Tamam! Inline HTML sayfası çalışıyor.'"
        style="
          cursor:pointer;
          border:none;
          padding: 12px 16px;
          border-radius: 14px;
          font-weight: 700;
          letter-spacing: .2px;
          color:#0b1220;
          background: linear-gradient(135deg, #ffffff, #d7e3ff);
          box-shadow: 0 10px 28px rgba(0,0,0,.35);
          transition: transform .12s ease;
          user-select:none;
        "
        onmousedown="this.style.transform='scale(.98)'"
        onmouseup="this.style.transform='scale(1)'"
        onmouseleave="this.style.transform='scale(1)'"
      >
        Test Et
      </button>
    </div>

    <div style="
      margin-top:22px;
      padding:16px 16px;
      border-radius:16px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.10);
      color: rgba(234,240,255,.86);
      font-size: 14px;
      line-height: 1.55;
    ">
      <div style="font-weight:700; margin-bottom:6px;">Durum</div>
      <div id="msg">Henüz bir işlem yapılmadı.</div>
    </div>

    <footer style="
      margin-top:18px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      color: rgba(234,240,255,.55);
      font-size: 12px;
    ">
      <span>© 2026 • A GİT FOLDER</span>
      <span style="opacity:.9;">Tek dosya • Inline CSS</span>
    </footer>
  </main>

</body>
</html>
